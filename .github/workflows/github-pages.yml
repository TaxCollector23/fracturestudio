# Optional: deploy static app to GitHub Pages. The API must live elsewhere (Netlify/Vercel/Cloudflare);
# set repository secret VITE_CHAT_API_BASE to that site's origin (no trailing slash), e.g. https://my-api.netlify.app
name: GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run test
      - name: Build with optional API base
        env:
          VITE_CHAT_API_BASE: ${{ secrets.VITE_CHAT_API_BASE }}
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build:github-pages
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
